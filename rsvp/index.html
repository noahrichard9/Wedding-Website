  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --cream: #f9f6f1;
      --warm-white: #fefcf8;
      --gold: #c5a96b;
      --gold-light: #d4bc8a;
      --dark: #2a2118;
      --charcoal: #3d3028;
      --text: #4a3f35;
      --font-display: 'Cormorant Garamond', serif;
      --font-body: 'Montserrat', sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--cream);
      color: var(--text);
      font-family: var(--font-body);
      font-weight: 300;
      overflow-x: hidden;
    }

    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      height: 70px;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(197,169,107,0.2);
      transition: background 0.4s, box-shadow 0.4s;
    }

    nav.scrolled {
      background: rgba(255,255,255,0.97);
      box-shadow: 0 2px 20px rgba(0,0,0,0.08);
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }

    .nav-logo img {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      object-fit: cover;
      border: 1.5px solid var(--gold);
    }

    .nav-logo-text {
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 400;
      color: var(--dark);
      letter-spacing: 0.05em;
      white-space: nowrap;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 32px;
      list-style: none;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }

    .nav-links a {
      font-family: var(--font-body);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--charcoal);
      text-decoration: none;
      position: relative;
      transition: color 0.3s;
    }

    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -3px; left: 0;
      width: 0; height: 1px;
      background: var(--gold);
      transition: width 0.3s;
    }

    .nav-links a:hover { color: var(--gold); }
    .nav-links a:hover::after { width: 100%; }

    #hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
      padding: 110px 24px 48px;
      background:
        linear-gradient(rgba(30,20,10,0.38), rgba(30,20,10,0.48)),
        url('../images/bottom.jpg') center/cover no-repeat;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      color: #fff;
      max-width: 1000px;
      width: 100%;
    }

    .hero-names {
      font-family: var(--font-display);
      font-size: clamp(13px, 2.5vw, 28px);
      font-weight: 300;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 20px;
      opacity: 0.95;
      padding: 0 16px;
    }

    .hero-divider {
      width: min(560px, 80vw);
      height: 1px;
      background: rgba(255,255,255,0.35);
      margin: 0 auto;
    }

    .rsvp-message {
      font-family: var(--font-display);
      font-size: clamp(54px, 9vw, 120px);
      font-weight: 600;
      letter-spacing: 0.08em;
      line-height: 0.95;
      text-transform: uppercase;
      margin: 40px auto;
      text-shadow: 0 2px 28px rgba(0,0,0,0.25);
    }

    .hero-subtext {
      font-family: var(--font-body);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.78);
    }

    @media (max-width: 900px) {
      nav { padding: 0 20px; }
      .nav-links { display: none; }
      .nav-logo-text { font-size: 13px; white-space: normal; }
      .rsvp-message { font-size: clamp(46px, 14vw, 86px); }
    }
  </style>
</head>
<body>
  <nav id="navbar">
    <a href="/" class="nav-logo">

      <span class="nav-logo-text">Noah John &amp; Adriana-Isabela</span>

    <ul class="nav-links" id="navLinks">
      <li><a href="/">Home</a></li>
      <li><a href="/rsvp/">RSVP</a></li>
      <li><a href="/things-to-do/">Things to Do</a></li>
      <li><a href="/#faq">FAQ</a></li>
      <li><a href="/#details">Weekend Details</a></li>
      <li><a href="https://registry.theknot.com/adriana-isabela-melendez-munoz-noah-john-richard-december-2026-maryland/77167356" target="_blank">Registry</a></li>
    </ul>
  </nav>

  <section id="hero">
    <div class="hero-content">
      <p class="hero-names">Noah John &amp; Adriana-Isabela</p>
      <div class="hero-divider"></div>
      <h1 class="rsvp-message">RSVP Coming Soon!</h1>
      <div class="hero-divider"></div>
      <p class="hero-subtext" style="margin-top: 28px;">Please check back soon for our RSVP page.</p>
    </div>
  </section>

  <script>
    window.addEventListener('scroll', function() {
      document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 20);
    });
  </script>
</body>
</html>
